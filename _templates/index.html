{% extends "base.html" %}
{% block content %}
<h2>文章列表</h2>

{% for post in posts %}
<div class="post">
    <h3><a href="./posts/{{ post.filename }}">{{ post.title }}</a></h3>
    <div class="tags">
        {% for tag in post.labels %}
        <span>{{ tag }}</span>
        {% endfor %}
    </div>
    <p>{{ post.created }}</p>
    <p>{{ post.excerpt }}...</p>
</div>
{% endfor %}

{% endblock %}
