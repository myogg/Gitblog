<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial;
            max-width: 800px;
            margin: auto;
            padding: 20px;
            line-height: 1.7;
            color: #222;
        }
        header {
            margin-bottom: 40px;
        }
        nav a {
            margin-right: 12px;
            text-decoration: none;
            color: #0070f3;
        }
        .post {
            margin-bottom: 45px;
            padding-bottom: 25px;
            border-bottom: 1px solid #eee;
        }
        .tags span {
            background: #f1f1f1;
            padding: 4px 8px;
            margin-right: 6px;
            border-radius: 4px;
            font-size: 12px;
        }
        footer {
            margin-top: 40px;
            text-align: center;
            color: #888;
        }
        pre {
            padding: 12px;
            background: #f6f6f6;
            border-radius: 4px;
            overflow-x: auto;
        }
        code {
            background: #f1f1f1;
            padding: 2px 4px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<header>
    <h1>MyGitBlog</h1>
    <nav>
        <a href="./index.html">首页</a>
        <a href="./tags.html">标签</a>
        <a href="https://github.com/myogg/gitblog">GitHub</a>
        <a href="./feed.xml">RSS</a>
    </nav>
</header>

{{ content }}

<footer>
    <p>Powered by GitHub Issues + GitHub Actions</p>
</footer>

</body>
</html>
