{% extends "base.html" %}
{% block content %}

<h2>{{ title }}</h2>

<div class="tags">
    {% for tag in labels %}
    <span>{{ tag }}</span>
    {% endfor %}
</div>

<p><em>{{ created }}</em></p>

<div class="content">
    {{ body }}
</div>

<hr>

<p>
    <a href="{{ url }}" target="_blank">在 GitHub 上查看此文章 →</a>
</p>

{% endblock %}
