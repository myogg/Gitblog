name: Sync Issues and Trigger Pages

on:
  issues:
    types: [opened, edited, deleted, reopened, labeled, unlabeled]
  issue_comment:
    types: [created, edited, deleted]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x

      - name: Execute Update Script
        env:
          G_TT: ${{ secrets.G_TT }}
        run: |
          python generate_page.py

      # 這裡不 push，不依賴 push 來觸發 Pages！
      # 改成主動呼叫 pages workflow

      - name: Trigger Pages Deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.G_TT }}
          event-type: deploy-pages
