name: Deploy GitHub Pages

on:
  workflow_dispatch:   # 手動觸發
  issues:
    types: [opened, edited, labeled, unlabeled, closed, reopened] # 監聽所有 Issue 變動

permissions:
  contents: write      # 需要寫入權限來提交快取文件（如果有的話）
  pages: write
  id-token: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 獲取完整歷史以利於部署

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 安裝核心依賴，確保包含 jinja2
          pip install markdown PyGithub jinja2 marko
          # 如果有 requirements.txt 則也安裝裡面的內容
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Prepare Directories
        run: |
          # 確保腳本需要的目錄都存在
          mkdir -p templates
          mkdir -p static
          mkdir -p articles

      - name: Generate HTML page
        env:
          G_TT: ${{ secrets.G_TT }}
        run: |
          echo "🚀 開始生成 HTML 頁面..."
          python generate_page.py
          
          echo "🔍 檢查生成結果:"
          if [ -f "index.html" ]; then
            echo "✅ index.html 已生成 (大小: $(stat -c%s index.html) bytes)"
          else
            echo "❌ 錯誤: index.html 未生成！"
            exit 1
          fi
          
          if [ -d "articles" ]; then
            echo "✅ articles 目錄存在，包含 $(ls articles/*.html 2>/dev/null | wc -l) 個文件"
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 上傳當前目錄下所有生成好的文件
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
