name: Deploy GitHub Pages

on:
  workflow_dispatch:   # 手動觸發
  issues:
    types: [labeled]  # 只監聽 labeled 事件（打標籤時）

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: true  # 取消正在運行的舊部署

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown PyGithub marko

      - name: Generate HTML page
        env:
          G_TT: ${{ secrets.G_TT }}  # 設置環境變量
        run: |
          echo "開始生成HTML頁面..."
          python generate_page.py
          
          echo "檢查生成的文件:"
          ls -la
          
          if [ -f "index.html" ]; then
            echo "✅ index.html 已生成"
            echo "文件大小: $(wc -l < index.html) 行"
          else
            echo "❌ index.html 未生成"
            exit 1
          fi
          
          if [ -d "static" ]; then
            echo "✅ static 目錄已生成"
            ls -la static/
          else
            echo "⚠️  static 目錄未生成"
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 上傳根目錄，包含 index.html 和 static/
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
