name: Deploy GitHub Pages

on:
  workflow_dispatch:   # 手動觸發
  issues:
    types: [labeled, opened, edited]  # 增加 opened/edited，確保新文章也能自動更新

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: true  # 取消正在運行的舊部署

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip' # 使用緩存加速

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 核心修改：在這裡補上 jinja2，並保留原有的庫
          pip install markdown PyGithub marko jinja2 feedgen

      - name: Generate HTML page
        env:
          G_TT: ${{ secrets.G_TT }}  # 保持 G_TT 不變
        run: |
          echo "開始生成HTML頁面..."
          python generate_page.py
          
          echo "檢查生成的文件:"
          ls -la
          
          # 檢查主頁
          if [ -f "index.html" ]; then
            echo "✅ index.html 已生成"
          else
            echo "❌ index.html 未生成"
            exit 1
          fi
          
          # 檢查 3D 標籤球歸檔頁
          if [ -f "archives.html" ]; then
            echo "✅ archives.html (3D標籤球) 已生成"
          else
            echo "❌ archives.html 未生成，請檢查模板"
            exit 1
          fi
          
          if [ -d "static" ]; then
            echo "✅ static 目錄已生成"
          else
            echo "⚠️  static 目錄未生成"
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 上傳包含所有生成 HTML 的根目錄
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
