name: Deploy GitHub Pages

on:
  workflow_dispatch:        # 手動觸發
  push:
    paths:
      - "README.md"
      - "BACKUP/**"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install markdown

      - name: Generate index.html with articles list
        run: |
          python - <<EOF
          import os
          import markdown

          # 讀取 README.md
          with open("README.md", "r", encoding="utf-8") as f:
              md_text = f.read()
          html_text = markdown.markdown(md_text, output_format="html5")

          # 生成文章列表
          backup_dir = "BACKUP"
          articles = []
          if os.path.exists(backup_dir):
              for file in sorted(os.listdir(backup_dir)):
                  if file.endswith(".md"):
                      title = file.split("_",1)[-1].replace(".md","")
                      link = os.path.join(backup_dir, file)
                      articles.append(f'<li><a href="{link}">{title}</a></li>')
          articles_html = "<ul>" + "".join(articles) + "</ul>" if articles else ""

          # 整個 HTML
          html_page = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>My GitBlog</title>
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
            <style>
              body {{ display: flex; justify-content: center; }}
              .markdown-body {{ max-width: 800px; padding: 2rem; }}
            </style>
          </head>
          <body>
            <div class="markdown-body">
            {html_text}
            <h2>文章列表</h2>
            {articles_html}
            </div>
          </body>
          </html>"""

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html_page)
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
