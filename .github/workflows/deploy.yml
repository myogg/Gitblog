name: Deploy GitHub Pages

on:
  workflow_dispatch:   # 手動觸發
  issues:
    # 這裡保留 labeled, opened, edited 以確保靈活性
    types: [labeled, opened, edited]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: true

jobs:
  deploy:
    # 【核心修改：主人准入制】
    # 只有滿足以下任一條件才運行：
    # 1. 是你手動觸發的 (workflow_dispatch)
    # 2. 觸發事件是 'labeled'（只有你能打標籤，這區分了主人和客人）
    if: |
      github.event_name == 'workflow_dispatch' || 
      github.event.action == 'labeled'
    
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown PyGithub marko jinja2 feedgen

      - name: Generate HTML page
        env:
          G_TT: ${{ secrets.G_TT }}
        run: |
          echo "開始生成HTML頁面..."
          python generate_page.py
          
          echo "檢查生成的文件:"
          ls -la
          
          if [ -f "index.html" ]; then
            echo "✅ index.html 已生成"
          else
            echo "❌ index.html 未生成"
            exit 1
          fi
          
          if [ -f "archives.html" ]; then
            echo "✅ archives.html (3D標籤球) 已生成"
          else
            echo "❌ archives.html 未生成"
            exit 1
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
