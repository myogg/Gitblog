<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{issue.title}} - 北方的博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
    <link rel="stylesheet" href="../static/style.css">
    <style>
        /* Giscus 评论区默认隐藏 */
        .giscus-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #f0f0f0;
            display: none;
        }
        .giscus-section.visible {
            display: block;
        }

        /* 底部头像区域样式 */
        .commenters-section {
            margin-top: 5rem; /* 与上方内容保持大间距 */
            padding: 2rem 0;
            border-top: 1px solid #eee;
        }
        
        .commenters-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .commenters-title {
            font-size: 0.85rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .commenters-avatars {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .commenter-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid #eee;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .commenter-avatar:hover {
            transform: scale(1.2);
            z-index: 10;
        }

        .comment-count-badge {
            background: #f0f0f0;
            color: #666;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
        }

        /* 按钮样式 */
        .action-btn {
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            border: 1px solid #e5e7eb;
            background: #fff;
            cursor: pointer;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="markdown-body">
        <h1 class="page-title">北方的博客</h1>
        
        <div class="nav-links">
            <a href="../index.html">首頁</a>
            <a href="../archives.html">歸檔</a>
            <a href="../search.html">搜索</a>
            <a href="../about.html">關於</a>
        </div>

        <div style="margin-top: 3rem;">
            <h2 style="border-bottom: none;">{{issue.title}}</h2>
            <div style="color: #666; margin-bottom: 20px;">
                {{issue.created_at.strftime('%B %d, %Y')}}
            </div>
            <article class="content-area">
                {{content|safe}}
            </article>
        </div>

        <div style="text-align: center; margin-top: 3rem;">
            <button id="toggle-comments-btn" class="action-btn">
                💬 展开评论区
            </button>
        </div>

        <div id="giscus-section" class="giscus-section">
            <script src="https://giscus.app/client.js"
                data-repo="myogg/Gitblog"
                data-repo-id="R_kgDONsRqQg"
                data-category="Announcements"
                data-category-id="DIC_kwDONsRqQs4C0PCO"
                data-mapping="pathname"
                data-strict="0"
                data-reactions-enabled="1"
                data-emit-metadata="1" 
                data-input-position="bottom"
                data-theme="preferred_color_scheme"
                data-lang="zh-TW"
                crossorigin="anonymous"
                async>
            </script>
        </div>

        <div class="commenters-section">
            <div class="commenters-header">
                <span class="commenters-title">Recent Commenters</span>
                <span class="comment-count-badge" id="total-count">0 Comments</span>
            </div>
            <div id="avatar-row" class="commenters-avatars">
                </div>
        </div>

        <footer>© 2025 Designed and developed by Jiang Sheng</footer>
    </div>

    <script>
        // 1. 评论区开关逻辑
        const toggleBtn = document.getElementById('toggle-comments-btn');
        const giscusSection = document.getElementById('giscus-section');
        
        toggleBtn.addEventListener('click', function() {
            const isVisible = giscusSection.classList.toggle('visible');
            toggleBtn.textContent = isVisible ? '收起评论区' : '展开评论区';
        });

        // 2. 核心：监听 Giscus 消息并提取头像和总数
        window.addEventListener('message', function(event) {
            if (event.origin !== 'https://giscus.app') return;
            
            const data = event.data.giscus;
            if (data && data.discussion) {
                // 更新总评论数
                const count = data.discussion.totalCommentCount + data.discussion.totalReplyCount;
                document.getElementById('total-count').textContent = `${count} Comments`;

                // 提取头像
                const userMap = new Map();
                // 遍历评论
                if (data.discussion.comments) {
                    data.discussion.comments.forEach(c => {
                        userMap.set(c.author.login, {
                            avatar: c.author.avatarUrl,
                            url: c.author.url
                        });
                        // 遍历回复
                        if (c.replies) {
                            c.replies.forEach(r => {
                                userMap.set(r.author.login, {
                                    avatar: r.author.avatarUrl,
                                    url: r.author.url
                                });
                            });
                        }
                    });
                }

                // 渲染到最底部的头像行
                const avatarRow = document.getElementById('avatar-row');
                avatarRow.innerHTML = ''; // 清空原有内容
                
                userMap.forEach((user, login) => {
                    const img = document.createElement('img');
                    img.src = user.avatar;
                    img.className = 'commenter-avatar';
                    img.title = `@${login}`;
                    img.onclick = () => window.open(user.url, '_blank');
                    avatarRow.appendChild(img);
                });
            }
        });
    </script>
</body>
</html>
