<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{TITLE}} - mYogg'Blog</title>
    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #64748b;
            --accent-color: #d97706;
            --light-bg: #f8fafc;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --card-shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #fefbf6 0%, #f5f1e8 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.7;
            color: #4a5568;
            min-height: 100vh;
            padding: 20px;
        }
        
        .article-wrapper {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .article-container {
            background: white;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-bottom: 30px;
        }
        
        .article-container:hover {
            box-shadow: var(--card-shadow-hover);
        }
        
        .article-header {
            background: linear-gradient(135deg, #fef9e7 0%, #fef3c7 100%);
            padding: 2.5rem 2.5rem 2rem;
            color: #78350f;
            position: relative;
            border-bottom: 1px solid #fde68a;
        }
        
        .article-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #fbbf24, #f59e0b, #d97706, #b45309);
            background-size: 300% 100%;
            animation: gradientMove 6s ease infinite;
        }
        
        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1.5rem;
            color: #92400e;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 8px 16px;
            background: rgba(245, 158, 11, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(245, 158, 11, 0.2);
            transition: all 0.2s ease;
        }
        
        .back-link:hover {
            background: rgba(245, 158, 11, 0.2);
            color: #78350f;
            transform: translateX(-3px);
            border-color: rgba(245, 158, 11, 0.3);
        }
        
        .article-title {
            margin: 0 0 1rem 0;
            color: #451a03;
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.3;
        }
        
        .article-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: #92400e;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.7);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #fde68a;
            backdrop-filter: blur(4px);
        }
        
        .meta-item i {
            color: #d97706;
        }
        
        .article-labels {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 1rem;
        }
        
        .article-content {
            padding: 2.5rem;
        }
        
        .original-link-container {
            margin-top: 3rem;
            padding: 1.8rem;
            background: #fef9e7;
            border-radius: 12px;
            border-left: 4px solid #f59e0b;
            position: relative;
            overflow: hidden;
            border: 1px solid #fde68a;
        }
        
        .original-link-container::before {
            content: '📝';
            position: absolute;
            top: 1.8rem;
            right: 1.8rem;
            font-size: 2rem;
            opacity: 0.15;
        }
        
        .original-link-container h4 {
            color: #b45309;
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .github-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 1rem;
            padding: 0.8rem 1.5rem;
            background: #1a202c;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }
        
        .github-link-btn:hover {
            background: #2d3748;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 32, 44, 0.2);
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #fed7aa;
        }
        
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.7rem 1.3rem;
            background: #fffbeb;
            color: #92400e;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            border: 1px solid #fde68a;
        }
        
        .btn-secondary:hover {
            background: #fef3c7;
            color: #78350f;
            transform: translateY(-1px);
            border-color: #fbbf24;
        }
        
        /* Markdown 内容美化 */
        .markdown-body {
            font-size: 1.05rem;
            color: #374151;
        }
        
        .markdown-body h1, 
        .markdown-body h2, 
        .markdown-body h3, 
        .markdown-body h4 {
            color: #1f2937;
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        
        .markdown-body h1 {
            border-bottom: 2px solid #fbbf24;
            padding-bottom: 0.5rem;
        }
        
        .markdown-body code {
            background: #fffbeb;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.9em;
            color: #92400e;
            border: 1px solid #fde68a;
        }
        
        .markdown-body pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1.2rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1.5rem 0;
            position: relative;
        }
        
        .markdown-body blockquote {
            border-left: 4px solid #f59e0b;
            background: #fffbeb;
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            border-radius: 0 8px 8px 0;
            font-style: italic;
            color: #78350f;
        }
        
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin: 1.5rem 0;
        }
        
        .markdown-body table th {
            background: #fef3c7;
            font-weight: 600;
            color: #92400e;
        }
        
        .markdown-body table th,
        .markdown-body table td {
            border: 1px solid #fde68a;
            padding: 0.75rem 1rem;
        }
        
        /* 标签样式 */
        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-right: 8px;
            margin-bottom: 8px;
            color: #451a03;
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.3);
            transition: all 0.2s ease;
        }
        
        .tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.2);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
                background: #fef9e7;
            }
            
            .article-header {
                padding: 1.5rem 1.5rem 1rem;
            }
            
            .article-title {
                font-size: 1.7rem;
            }
            
            .article-content {
                padding: 1.5rem;
            }
            
            .article-meta {
                flex-direction: column;
                gap: 10px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .github-link-btn,
            .btn-secondary {
                width: 100%;
                justify-content: center;
            }
        }
        
        @media (max-width: 480px) {
            .article-title {
                font-size: 1.5rem;
            }
            
            .article-header {
                padding: 1.2rem 1.2rem 1rem;
            }
            
            .article-content {
                padding: 1.2rem;
            }
        }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #fef3c7;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #f59e0b;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #d97706;
        }
        
        /* 打印样式 */
        @media print {
            body {
                background: white;
                padding: 0;
            }
            
            .article-container {
                box-shadow: none;
                margin: 0;
            }
            
            .back-link,
            .github-link-btn,
            .action-buttons {
                display: none;
            }
            
            .article-header {
                background: white !important;
                color: black !important;
                border-bottom: 2px solid #ccc;
            }
            
            .article-title {
                color: black !important;
            }
        }
        
        /* 优雅的淡入动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .article-container {
            animation: fadeInUp 0.6s ease-out;
        }
        
        /* 美化选中文本 */
        ::selection {
            background: rgba(245, 158, 11, 0.3);
            color: #451a03;
        }
        
        /* 为代码块添加行号 */
        pre {
            position: relative;
        }
        
        pre code {
            display: block;
            padding-left: 3.5em;
        }
        
        pre::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3em;
            background: rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            text-align: right;
            padding: 1.2rem 0.5rem;
            color: #94a3b8;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
            line-height: 1.5;
            counter-reset: line;
        }
        
        pre code {
            counter-reset: line-number;
        }
        
        pre code .line {
            display: block;
            position: relative;
        }
        
        pre code .line::before {
            counter-increment: line-number;
            content: counter(line-number);
            position: absolute;
            left: -3.5em;
            width: 2.5em;
            text-align: right;
            color: #94a3b8;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="article-wrapper">
        <div class="article-container">
            <div class="article-header">
                <a href="../index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i>
                    返回博客首页
                </a>
                
                <h1 class="article-title">{{TITLE}}</h1>
                
                <div class="article-meta">
                    <div class="meta-item">
                        <i class="far fa-calendar-alt"></i>
                        <span>发布于: {{DATE}}</span>
                    </div>
                    <div class="meta-item">
                        <i class="fas fa-hashtag"></i>
                        <span>文章ID: #{{NUMBER}}</span>
                    </div>
                </div>
                
                <div class="article-labels">
                    {{LABELS}}
                </div>
            </div>
            
            <div class="article-content markdown-body">
                {{CONTENT}}
                
                <div class="original-link-container">
                    <h4><i class="fas fa-external-link-alt"></i> 原文信息</h4>
                    <p>本文内容来自GitHub Issues，点击下方链接查看原文和参与讨论：</p>
                    <a href="{{ORIGINAL_URL}}" class="github-link-btn" target="_blank" rel="noopener">
                        <i class="fab fa-github"></i>
                        在GitHub上查看此文章
                    </a>
                    <p style="margin-top: 1rem; font-size: 0.9rem; color: #92400e;">
                        <i class="fas fa-info-circle"></i> 评论和更新将在GitHub Issues中进行，此处为静态页面。
                    </p>
                </div>
                
                <div class="action-buttons">
                    <a href="../index.html" class="btn-secondary">
                        <i class="fas fa-home"></i>
                        返回首页
                    </a>
                    <a href="{{ORIGINAL_URL}}" class="btn-secondary" target="_blank" rel="noopener">
                        <i class="fas fa-comments"></i>
                        参与讨论
                    </a>
                    <a href="javascript:window.print()" class="btn-secondary">
                        <i class="fas fa-print"></i>
                        打印文章
                    </a>
                    <a href="javascript:window.scrollTo({top: 0, behavior: 'smooth'})" class="btn-secondary">
                        <i class="fas fa-arrow-up"></i>
                        回到顶部
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 添加平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
        
        // 添加代码块复制功能
        document.querySelectorAll('pre').forEach(pre => {
            const button = document.createElement('button');
            button.className = 'copy-code-btn';
            button.innerHTML = '<i class="far fa-copy"></i> 复制';
            button.style.cssText = `
                position: absolute;
                top: 10px;
                right: 10px;
                background: rgba(59, 130, 246, 0.9);
                border: none;
                color: white;
                padding: 6px 12px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 12px;
                transition: all 0.2s ease;
                font-family: inherit;
                z-index: 10;
                display: flex;
                align-items: center;
                gap: 4px;
            `;
            button.addEventListener('mouseenter', () => {
                button.style.background = 'rgba(37, 99, 235, 1)';
                button.style.transform = 'scale(1.05)';
            });
            button.addEventListener('mouseleave', () => {
                button.style.background = 'rgba(59, 130, 246, 0.9)';
                button.style.transform = 'scale(1)';
            });
            button.addEventListener('click', () => {
                const code = pre.querySelector('code')?.innerText || pre.innerText;
                navigator.clipboard.writeText(code).then(() => {
                    const originalHTML = button.innerHTML;
                    const originalBG = button.style.background;
                    button.innerHTML = '<i class="fas fa-check"></i> 已复制';
                    button.style.background = '#10b981';
                    button.disabled = true;
                    
                    setTimeout(() => {
                        button.innerHTML = originalHTML;
                        button.style.background = originalBG;
                        button.disabled = false;
                    }, 2000);
                }).catch(err => {
                    console.error('复制失败:', err);
                    button.innerHTML = '<i class="fas fa-times"></i> 失败';
                    button.style.background = '#ef4444';
                    
                    setTimeout(() => {
                        button.innerHTML = originalHTML;
                        button.style.background = originalBG;
                    }, 2000);
                });
            });
            
            pre.style.position = 'relative';
            pre.appendChild(button);
        });
        
        // 为标题添加锚点链接
        document.querySelectorAll('.markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4').forEach(heading => {
            const id = heading.textContent.toLowerCase().replace(/[^\w]+/g, '-');
            heading.id = id;
            
            const link = document.createElement('a');
            link.href = `#${id}`;
            link.className = 'heading-link';
            link.innerHTML = '<i class="fas fa-link"></i>';
            link.style.cssText = `
                margin-left: 10px;
                opacity: 0;
                transition: opacity 0.2s;
                color: #f59e0b;
                text-decoration: none;
                font-size: 0.8em;
            `;
            
            heading.appendChild(link);
            
            heading.addEventListener('mouseenter', () => {
                link.style.opacity = '1';
            });
            
            heading.addEventListener('mouseleave', () => {
                link.style.opacity = '0';
            });
        });
        
        // 添加页面加载完成后的动画
        document.addEventListener('DOMContentLoaded', () => {
            // 为内容添加逐段显示效果
            const contentSections = document.querySelectorAll('.markdown-body > *');
            contentSections.forEach((section, index) => {
                section.style.opacity = '0';
                section.style.transform = 'translateY(10px)';
                section.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                
                setTimeout(() => {
                    section.style.opacity = '1';
                    section.style.transform = 'translateY(0)';
                }, 100 + index * 50);
            });
        });
    </script>
</body>
</html>
