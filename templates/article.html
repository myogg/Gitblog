<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{issue.title}} - 北方的博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <div class="markdown-body">
        <h1 class="page-title">北方的博客</h1>
        <div class="nav-links">
            <a href="../index.html">← 首頁</a>
            <a href="../archives.html">歸檔</a>
            <a href="../about.html">關於</a>
        </div>

        <header class="article-header" style="margin: 3rem 0;">
            <h1 style="font-size: 2rem; font-weight: 800; color: #000; border-bottom: none; margin-bottom: 0.5rem;">{{issue.title}}</h1>
            <div class="article-meta" style="color: #bbb; font-family: monospace; font-size: 0.9rem;">
                {{issue.created_at.strftime('%Y/%m/%d')}}
            </div>
        </header>

        <article class="content-area">
            {{ content | safe }}
        </article>

        <footer style="margin-top: 5rem; text-align: center; color: #bbb; font-size: 0.8rem;">
            © 2025 Designed and developed by Jiang Sheng
        </footer>
    </div>
</body>
</html>
