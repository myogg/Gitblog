<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{issue.title}} - 北方的博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <div class="markdown-body">
        <div class="header-line"></div>
        <div class="article-header">
            <h1 class="article-title">{{issue.title}}</h1>
            <div class="article-meta">发布于: {{issue.created_at.strftime('%Y-%m-%d')}} | ID: {{issue.number}}</div>
            <div class="article-labels">
                {% for l in labels_data %}
                <span class="tag" style="background-color:#{{l.color}}; color:{{l.text_color}};">{{l.name}}</span>
                {% endfor %}
            </div>
        </div>
        <div class="article-content">{{content|safe}}</div>
        <div style="margin-top:2rem; text-align:center;">
            <a href="../index.html" style="padding:10px 20px; background:#f0f0f0; border-radius:5px;">返回首頁</a>
        </div>
        <footer>© {{YEAR}} 北方的博客. All rights reserved.</footer>
    </div>
</body>
</html>
