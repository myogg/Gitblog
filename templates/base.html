<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>mYogg'Blog</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div class="markdown-body">
        <div class="header-line"></div>
        
        <!-- 修改1：导航栏替换标题 -->
        <nav class="site-nav">
            <a href="index.html" class="nav-link">首页</a>
            <a href="about.html" class="nav-link">关于</a>
            <a href="archives.html" class="nav-link">归档</a>
        </nav>
        
        <!-- 主内容容器 -->
        <div class="main-container">
            <!-- 左侧标签栏 -->
            <div class="sidebar">
                <div class="filter-controls">
                    <h3 style="margin:0;">標簽</h3>
                    <span class="clear-filter" id="clear-filter">清除篩選</span>
                </div>
                <div class="filter-info" id="filter-info">點擊標籤篩選文章</div>
                <div class="tags-container">
                    {{TAGS}}
                </div>
                
                <!-- 修改2：最近文章移到侧边栏内 -->
                {{RECENT_ARTICLES}}
            </div>
            
            <!-- 右侧文章内容区域 -->
            <div id="categories-container">
                {{PINNED_ARTICLES}}
                {{CATEGORIES}}
            </div>
        </div>
        
        <div class="no-results" id="no-results">沒有找到相關文章</div>
        <footer>© {{YEAR}} MyOGG. All rights reserved.</footer>
    </div>
    
    <script src="static/script.js"></script>
</body>
</html>
