<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北方的博客</title>
    <meta name="description" content="北方的博客 - 70后的分享，记录技术、生活和思考。探索编程、人工智能、个人成长等话题。">
    <meta name="keywords" content="博客,技术博客,编程,AI,个人成长,北方">
    <meta name="author" content="Jiang Sheng">
    
    <meta property="og:title" content="北方的博客">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://134688.xyz/">
    <meta property="og:description" content="北方的博客 - 70后的分享，记录技术、生活和思考。探索编程、人工智能、个人成长等话题。">
    <meta property="og:site_name" content="北方的博客">
    
    <!-- GitHub Markdown CSS - 使用jsDelivr国内加速 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.2.0/github-markdown-light.min.css">
    <link rel="stylesheet" href="static/style.css">

    <!-- Structured Data - Website & Author -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Blog",
        "name": "北方的博客",
        "description": "70后的分享，记录技术、生活和思考。探索编程、人工智能、个人成长等话题。",
        "url": "https://134688.xyz",
        "inLanguage": "zh-CN",
        "author": {
            "@type": "Person",
            "name": "Jiang Sheng",
            "url": "https://134688.xyz/about.html",
            "sameAs": [
                "https://github.com/myogg",
                "https://www.facebook.com/lengyu.jiang"
            ]
        },
        "publisher": {
            "@type": "Person",
            "name": "Jiang Sheng"
        }
    }
    </script>
</head>
<body>
    <div class="markdown-body">
        <h1 class="page-title"><a href="index.html">北方的博客</a></h1>

        <div class="nav-links">
            <a href="index.html">首頁</a>
            <a href="search.html">搜索</a>
            <a href="about.html">關於</a>
        </div>

        <div id="timeline-container">
            {% for year, issues in articles_by_year.items() %}
            <div class="year-section">
                <h2 class="year-label">{{year}}年</h2>
                <ul class="article-list">
                    {% for i in issues %}
                    <li>
                        <div class="article-item">
                            <div class="article-header">
                                <span class="article-date">{{i.created_at.strftime('%m-%d')}}</span>
                                <a href="articles/article-{{i.number}}.html" class="article-title-link">{{i.title}}</a>
                            </div>
                            {% if i.summary %}
                            <div class="article-summary">{{i.summary}}</div>
                            {% endif %}
                        </div>
                    </li>
                    {% endfor %}
                </ul>
            </div>
            {% endfor %}
        </div>

        <footer>© {{YEAR}} Designed and developed by Jiang Sheng</footer>
    </div>

    <!-- 返回顶部按钮 -->
    <button class="back-to-top" id="backToTop" aria-label="返回顶部">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <script src="static/script.js"></script>
</body>
</html>
