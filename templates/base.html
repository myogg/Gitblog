<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>北方的博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div class="markdown-body">
        <h1 class="page-title">北方的博客</h1>

        <div class="nav-links">
            <a href="index.html">首頁</a>
            <a href="search.html">搜索</a>
            <a href="about.html">關於</a>
        </div>

        <div id="timeline-container">
            {% if all_issues %}
            <div class="timeline-section">
                <ul class="article-list">
                    {% for i in all_issues %}
                    <li>
                        <div class="article-item">
                            <div class="article-header">
                                <span class="article-date">{{i.created_at.strftime('%Y-%m-%d')}}</span>
                                <a href="articles/article-{{i.number}}.html" class="article-title-link">{{i.title}}</a>
                            </div>
                            {% if i.summary %}
                            <div class="article-summary">{{i.summary}}</div>
                            {% endif %}
                        </div>
                    </li>
                    {% endfor %}
                </ul>
            </div>
            {% endif %}
        </div>

        <footer>© {{YEAR}} Designed and developed by Jiang Sheng</footer>
    </div>
</body>
</html>
