<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>北方的博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div class="markdown-body">
        <div class="header-line"></div>
        <h1 class="page-title">北方的博客</h1>
        
        <!-- 主内容容器：实现左右布局 -->
        <div class="main-container">
            <!-- 左侧标签栏 -->
            <div class="sidebar">
                <div class="filter-controls">
                    <h3 style="margin:0;">標簽</h3>
                    <span class="clear-filter" id="clear-filter">清除篩選</span>
                </div>
                <div class="filter-info" id="filter-info">點擊標籤篩選文章</div>
                <div class="tags-container">
                    {{TAGS}}
                </div>
            </div>
            
            <!-- 右侧文章内容区域 -->
            <div id="categories-container">
                {{PINNED_ARTICLES}}
                {{RECENT_ARTICLES}}
                {{CATEGORIES}}
            </div>
        </div>
        
        <!-- 無結果提示 -->
        <div class="no-results" id="no-results">沒有找到相關文章</div>
        
        <footer>© {{YEAR}} MyOGG. All rights reserved.</footer>
    </div>
    
    <script src="static/script.js"></script>
</body>
</html>
