<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章歸檔 - 北方的博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
    <style>
        body { 
            background: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            margin: 0;
        }
        .markdown-body { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 40px 20px; 
        }
        
        #sphere-container {
            width: 100%;
            height: 420px; 
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0 30px 0;
            overflow: hidden;
            position: relative;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 12px;
            border: 1px solid #e1e4e8;
        }

        /* 增大显示尺寸至420px，字体更清晰 */
        canvas#tagCanvas {
            width: 420px;
            height: 420px;
            cursor: pointer;
        }

        .filter-info { 
            text-align: center; 
            margin: 25px 0; 
            min-height: 40px;
            padding: 12px;
            background: #f1f8ff;
            border-radius: 8px;
            border-left: 4px solid #0366d6;
            font-size: 15px;
        }
        
        .year-section { 
            margin-top: 35px; 
            border-left: 4px solid #0366d6; 
            padding-left: 20px;
            background: #f8f9fa;
            border-radius: 0 8px 8px 0;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .year-section:hover {
            background: #f1f8ff;
            transform: translateX(5px);
        }
        
        .year-section h2 {
            color: #24292e;
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 2px dashed #e1e4e8;
            font-size: 22px;
        }
        
        .archive-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 14px 0; 
            border-bottom: 1px solid #f0f0f0; 
            transition: all 0.2s ease;
        }
        
        .archive-item:hover {
            background: #f6f8fa;
            padding-left: 10px;
            border-radius: 6px;
        }
        
        .archive-item a {
            color: #24292e;
            text-decoration: none;
            font-weight: 500;
            flex: 1;
            font-size: 16px;
            transition: color 0.2s ease;
        }
        
        .archive-item a:hover {
            color: #0366d6;
            text-decoration: underline;
        }
        
        .archive-date { 
            color: #6a737d; 
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; 
            font-size: 14px;
            background: #f6f8fa;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid #e1e4e8;
        }
        
        #tag-data { display: none; }
        
        .reset-btn {
            display: inline-block;
            margin-left: 12px;
            padding: 6px 14px;
            font-size: 13px;
            background: #0366d6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            vertical-align: middle;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        
        .reset-btn:hover {
            background: #0256b9;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(3, 102, 214, 0.2);
        }
        
        .active-tag-hint { 
            color: #0366d6; 
            font-weight: bold; 
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .active-tag-hint::before {
            content: "#";
            color: #6f42c1;
            font-weight: 900;
        }
        
        h1 {
            text-align: center; 
            border-bottom: none;
            margin-bottom: 10px;
            color: #24292e;
            font-size: 32px;
            position: relative;
            padding-bottom: 15px;
        }
        
        h1::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #0366d6, #4CAF50);
            border-radius: 2px;
        }
        
        .back-to-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: #f6f8fa;
            border-radius: 8px;
            text-decoration: none;
            color: #24292e;
            margin-bottom: 25px;
            border: 1px solid #e1e4e8;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        
        .back-to-home:hover {
            background: #0366d6;
            color: white;
            transform: translateX(-3px);
            box-shadow: 0 4px 12px rgba(3, 102, 214, 0.15);
        }
        
        @media (max-width: 768px) {
            #sphere-container {
                height: 320px;
            }
            
            canvas#tagCanvas {
                width: 320px;
                height: 320px;
            }
            
            .markdown-body {
                padding: 20px 15px;
            }
            
            .archive-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            
            .archive-date {
                align-self: flex-end;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="markdown-body">
        <!-- 只修改了返回链接的样式 -->
        <a href="index.html" class="back-to-home">
            <span>←</span>
            <span>返回首頁</span>
        </a>
        
        <!-- 标题保持不变 -->
        <h1 style="text-align: center; border-bottom: none; margin-bottom: 0;">文章歸檔</h1>

        <!-- 3D标签云容器 - 增加了背景和圆角 -->
        <div id="sphere-container">
            <canvas width="700" height="700" id="tagCanvas">
                <p style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #666;">
                    您的瀏覽器不支持 Canvas
                </p>
            </canvas>
        </div>

        <!-- 筛选信息区域 - 增加了背景和样式 -->
        <div class="filter-info" id="filterDisplay"></div>

        <!-- 标签数据容器（隐藏） - 完全不变 -->
        <ul id="tag-data">
            {% for name, items in label_dict.items() %}
            <li>
                <a href="javascript:void(0)" onclick="filterByTag('{{ name }}')" style="color: #{{ label_info[name].color }};">
                    {{ name }}
                </a>
            </li>
            {% endfor %}
        </ul>

        <!-- 文章归档内容 - 完全不变 -->
        <div id="archive-content">
            {% for year in sorted_years %}
            <div class="year-section" data-year="{{ year }}">
                <h2>{{ year }} 年</h2>
                <ul style="list-style: none; padding: 0;">
                    {% for issue in articles_by_year[year] %}
                    <li class="archive-item" data-tags="{{ issue.labels | map(attribute='name') | join(',') }}">
                        <a href="articles/article-{{ issue.number }}.html">{{ issue.title }}</a>
                        <span class="archive-date">{{ issue.created_at.strftime('%m-%d') }}</span>
                    </li>
                    {% endfor %}
                </ul>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- JavaScript部分完全不变 -->
    <script src="https://www.goat1000.com/tagcanvas.min.js" type="text/javascript"></script>

    <script type="text/javascript">
        window.onload = function() {
            try {
                TagCanvas.Start('tagCanvas', 'tag-data', {
                    textColour: null,
                    outlineColour: 'transparent',
                    reverse: true,
                    depth: 0.1,
                    zoom: 1.1,
                    maxSpeed: 0.03,
                    initial: [0.1, -0.1],
                    wheelZoom: false,
                    dragControl: true,
                    clickToFront: 600,
                    freezeActive: true,
                    frontSelect: true,
                    weight: true,
                    weightMode: 'size',
                    weightSize: 1.5,
                    minFontSize: 30,
                    maxFontSize: 60,
                    textFont: 'Impact, Arial Black, sans-serif',
                    padding: 5,
                    outlineMethod: 'colour',
                    activeCursor: 'pointer',
                    stretchX: 1.2
                });
            } catch(e) {
                document.getElementById('sphere-container').style.display = 'none';
            }
        };

        function filterByTag(tagName) {
            const items = document.querySelectorAll('.archive-item');
            const sections = document.querySelectorAll('.year-section');
            const display = document.getElementById('filterDisplay');
            display.innerHTML = `<span class="active-tag-hint">已選標籤：#${tagName}</span> <span class="reset-btn" onclick="resetFilter()">顯示全部</span>`;
            items.forEach(item => {
                const tags = item.getAttribute('data-tags').split(',');
                item.style.display = tags.includes(tagName) ? 'flex' : 'none';
            });
            sections.forEach(section => {
                const hasVisible = Array.from(section.querySelectorAll('.archive-item')).some(i => i.style.display === 'flex');
                section.style.display = hasVisible ? 'block' : 'none';
            });
        }

        function resetFilter() {
            document.querySelectorAll('.archive-item').forEach(i => i.style.display = 'flex');
            document.querySelectorAll('.year-section').forEach(s => s.style.display = 'block');
            document.getElementById('filterDisplay').innerHTML = '';
        }
    </script>
</body>
</html>
