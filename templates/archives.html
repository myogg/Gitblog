<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章歸檔 - 北方的博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
    <style>
        body { background: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
        .markdown-body { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        /* 1. 解決字體模糊：Canvas 容器保持固定顯示大小 */
        #sphere-container {
            width: 100%;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            cursor: pointer;
        }

        .year-section { margin-top: 30px; border-left: 4px solid #0366d6; padding-left: 15px; transition: all 0.3s; }
        .archive-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 0; 
            border-bottom: 1px solid #f0f0f0; 
            transition: opacity 0.3s;
        }
        .archive-date { color: #888; font-family: monospace; }
        .filter-info { 
            text-align: center; 
            color: #0366d6; 
            margin-bottom: 20px; 
            font-weight: bold;
            height: 24px;
        }
        #tag-data { display: none; }
        
        /* 重置按鈕樣式 */
        .reset-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 10px;
            font-size: 12px;
            background: #f6f8fa;
            border: 1px solid #d1d5da;
            border-radius: 3px;
            cursor: pointer;
            color: #24292e;
        }
    </style>
</head>
<body>
    <div class="markdown-body">
        <a href="index.html" style="text-decoration: none; color: #0366d6;">← 返回首頁</a>
        <h1 style="text-align: center; border-bottom: none;">文章歸檔</h1>

        <div id="sphere-container">
            <canvas width="1000" height="1000" id="tagCanvas" style="width: 500px; height: 500px;">
                <p>您的瀏覽器不支持 Canvas</p>
            </canvas>
        </div>

        <div class="filter-info" id="filterDisplay">
            </div>

        <ul id="tag-data">
            {% for name, items in label_dict.items() %}
            <li>
                <a href="javascript:void(0)" onclick="filterByTag('{{ name }}')" style="color: #{{ label_info[name].color }};">
                    {{ name }}
                </a>
            </li>
            {% endfor %}
        </ul>

        <div id="archive-content">
            {% for year in sorted_years %}
            <div class="year-section" data-year="{{ year }}">
                <h2>{{ year }} 年</h2>
                <ul style="list-style: none; padding: 0;">
                    {% for issue in articles_by_year[year] %}
                    <li class="archive-item" data-tags="{{ issue.labels | map(attribute='name') | join(',') }}">
                        <a href="articles/article-{{ issue.number }}.html">{{ issue.title }}</a>
                        <span class="archive-date">{{ issue.created_at.strftime('%m-%d') }}</span>
                    </li>
                    {% endfor %}
                </ul>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://www.goat1000.com/tagcanvas.min.js" type="text/javascript"></script>

    <script type="text/javascript">
        // --- 1. 初始化 3D 球體 ---
        window.onload = function() {
            try {
                TagCanvas.Start('tagCanvas', 'tag-data', {
                    textColour: null,
                    outlineColour: 'transparent',
                    reverse: true,
                    depth: 0.8,
                    maxSpeed: 0.05,
                    initial: [0.1, -0.1],
                    wheelZoom: false,
                    dragControl: true,
                    clickToFront: 600,
                    freezeActive: true,      // 滑鼠懸停時暫停，確保點擊精準
                    frontSelect: true,       // 只選中前面的標籤
                    weight: true,
                    weightMode: 'size',
                    weightSize: 0.7,
                    minFontSize: 16,
                    maxFontSize: 24,
                    textFont: 'Arial, sans-serif' // 解決字體模糊
                });
            } catch(e) {
                document.getElementById('sphere-container').style.display = 'none';
            }
        };

        // --- 2. 核心過濾邏輯 ---
        function filterByTag(tagName) {
            const items = document.querySelectorAll('.archive-item');
            const sections = document.querySelectorAll('.year-section');
            const display = document.getElementById('filterDisplay');

            // 更新提示文字
            display.innerHTML = `正在查看標籤: <span style="color:red">#${tagName}</span> <span class="reset-btn" onclick="resetFilter()">顯示全部</span>`;

            items.forEach(item => {
                const tags = item.getAttribute('data-tags').split(',');
                // 檢查文章標籤是否包含選中的標籤
                if (tags.includes(tagName)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });

            // 處理年份標題的顯示與隱藏
            sections.forEach(section => {
                const hasVisibleItem = Array.from(section.querySelectorAll('.archive-item'))
                                            .some(item => item.style.display === 'flex');
                section.style.display = hasVisibleItem ? 'block' : 'none';
            });
        }

        // --- 3. 重置過濾 ---
        function resetFilter() {
            document.querySelectorAll('.archive-item').forEach(i => i.style.display = 'flex');
            document.querySelectorAll('.year-section').forEach(s => s.style.display = 'block');
            document.getElementById('filterDisplay').innerHTML = '';
        }
    </script>
</body>
</html>
