<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章歸檔 - 北方的博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
    <style>
        body { background: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
        .markdown-body { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        /* 横屏区域容器 */
        #horizontal-container {
            width: 100%;
            height: 0;
            padding-bottom: 40%; /* 横屏比例 5:2 */
            position: relative;
            margin: 20px 0;
            overflow: hidden;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        /* 标签容器 */
        #tagCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            cursor: pointer;
        }

        .filter-info { text-align: center; margin-bottom: 20px; min-height: 30px; }
        .year-section { margin-top: 30px; border-left: 4px solid #0366d6; padding-left: 15px; }
        .archive-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .archive-date { color: #888; font-family: monospace; }
        #tag-data { display: none; }
        .reset-btn {
            display: inline-block;
            margin-left: 10px;
            padding: 2px 8px;
            font-size: 12px;
            background: #f6f8fa;
            border: 1px solid #d1d5da;
            border-radius: 3px;
            cursor: pointer;
            color: #24292e;
            vertical-align: middle;
        }
        .active-tag-hint { color: #0366d6; font-weight: bold; font-size: 1.1em; }
        
        /* 移动版调整 */
        @media (max-width: 768px) {
            .markdown-body {
                padding: 20px 15px;
            }
            
            #horizontal-container {
                padding-bottom: 60%; /* 手机版更高一些 */
                margin: 15px 0;
                box-shadow: 0 1px 6px rgba(0, 0, 0, 0.05);
            }
        }
    </style>
</head>
<body>
    <div class="markdown-body">
        <a href="index.html" style="text-decoration: none; color: #0366d6;">← 返回首頁</a>
        <h1 style="text-align: center; border-bottom: none; margin-bottom: 0;">文章歸檔</h1>

        <!-- 横屏区域容器 -->
        <div id="horizontal-container">
            <canvas id="tagCanvas">
                <p>您的瀏覽器不支持 Canvas</p>
            </canvas>
        </div>

        <div class="filter-info" id="filterDisplay"></div>

        <!-- 标签数据 -->
        <ul id="tag-data">
            {% for name, items in label_dict.items() %}
            <li>
                <a href="javascript:void(0)" onclick="filterByTag('{{ name }}')" 
                   style="color: #{{ label_info[name].color }};"
                   data-weight="{{ items|length }}">
                    {{ name }}
                </a>
            </li>
            {% endfor %}
        </ul>

        <div id="archive-content">
            {% for year in sorted_years %}
            <div class="year-section" data-year="{{ year }}">
                <h2>{{ year }} 年</h2>
                <ul style="list-style: none; padding: 0;">
                    {% for issue in articles_by_year[year] %}
                    <li class="archive-item" data-tags="{{ issue.labels | map(attribute='name') | join(',') }}">
                        <a href="articles/article-{{ issue.number }}.html">{{ issue.title }}</a>
                        <span class="archive-date">{{ issue.created_at.strftime('%m-%d') }}</span>
                    </li>
                    {% endfor %}
                </ul>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://www.goat1000.com/tagcanvas.min.js" type="text/javascript"></script>

    <script type="text/javascript">
        // 检测是否为移动设备
        function isMobileDevice() {
            return window.innerWidth <= 768;
        }
        
        // 获取字体大小配置
        function getFontConfig() {
            if (isMobileDevice()) {
                // 移动版 8-20px
                return {
                    minFontSize: 8,
                    maxFontSize: 20,
                    textHeight: 12
                };
            } else {
                // 电脑版 12-28px
                return {
                    minFontSize: 12,
                    maxFontSize: 28,
                    textHeight: 16
                };
            }
        }
        
        // 初始化标签权重
        function initTagWeights() {
            const tagLinks = document.querySelectorAll('#tag-data li a');
            let maxArticles = 0;
            
            // 找出最大文章数量
            tagLinks.forEach(link => {
                const count = parseInt(link.getAttribute('data-weight') || '1');
                if (count > maxArticles) maxArticles = count;
            });
            
            // 计算权重（基于文章数量）
            tagLinks.forEach(link => {
                const count = parseInt(link.getAttribute('data-weight') || '1');
                const weight = 0.5 + (count / maxArticles) * 1.5; // 0.5 到 2.0
                link.setAttribute('data-weight', weight.toFixed(2));
            });
            
            return maxArticles;
        }
        
        // 生成随机位置和速度
        function generateRandomMovement() {
            const movements = [];
            const tagCount = document.querySelectorAll('#tag-data li a').length;
            
            for (let i = 0; i < tagCount; i++) {
                movements.push({
                    x: Math.random() * 0.8 - 0.4, // -0.4 到 0.4
                    y: Math.random() * 0.6 - 0.3, // -0.3 到 0.3
                    speedX: (Math.random() - 0.5) * 0.002,
                    speedY: (Math.random() - 0.5) * 0.0015,
                    bounce: Math.random() * 0.003 + 0.001
                });
            }
            
            return movements;
        }
        
        // 横屏区域随机转动
        function startHorizontalMovement() {
            const canvas = document.getElementById('tagCanvas');
            let movements = generateRandomMovement();
            let lastTime = 0;
            
            function updateMovement(timestamp) {
                if (!lastTime) lastTime = timestamp;
                const deltaTime = timestamp - lastTime;
                lastTime = timestamp;
                
                try {
                    const currentObj = TagCanvas.GetObject('tagCanvas');
                    if (currentObj && currentObj.lx) {
                        // 更新每个标签的位置
                        movements.forEach((movement, index) => {
                            // 更新位置
                            movement.x += movement.speedX * deltaTime;
                            movement.y += movement.speedY * deltaTime;
                            
                            // 边界检查
                            if (Math.abs(movement.x) > 0.4) {
                                movement.speedX = -movement.speedX * (0.9 + Math.random() * 0.1);
                                movement.x = Math.sign(movement.x) * 0.4;
                            }
                            
                            if (Math.abs(movement.y) > 0.3) {
                                movement.speedY = -movement.speedY * (0.9 + Math.random() * 0.1);
                                movement.y = Math.sign(movement.y) * 0.3;
                            }
                            
                            // 轻微随机速度变化
                            if (Math.random() < 0.01) {
                                movement.speedX += (Math.random() - 0.5) * 0.0005;
                                movement.speedY += (Math.random() - 0.5) * 0.0003;
                            }
                            
                            // 应用到标签位置
                            if (currentObj.lx[index] !== undefined) {
                                currentObj.lx[index] = movement.x;
                                currentObj.ly[index] = movement.y;
                            }
                        });
                        
                        TagCanvas.Reload('tagCanvas');
                    }
                } catch(e) {
                    // 重新生成运动数据
                    movements = generateRandomMovement();
                }
                
                requestAnimationFrame(updateMovement);
            }
            
            requestAnimationFrame(updateMovement);
        }
        
        // 自适应调整
        function adaptSize() {
            const container = document.getElementById('horizontal-container');
            const tagCanvas = document.getElementById('tagCanvas');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            tagCanvas.width = width;
            tagCanvas.height = height;
            
            try {
                TagCanvas.Reload('tagCanvas');
            } catch(e) {}
        }
        
        // 初始化TagCanvas - 横屏平面布局
        function initTagCanvas() {
            const fontConfig = getFontConfig();
            
            try {
                TagCanvas.Start('tagCanvas', 'tag-data', {
                    textColour: null,
                    outlineColour: 'transparent',
                    reverse: false,
                    
                    // 字体大小
                    minFontSize: fontConfig.minFontSize,
                    maxFontSize: fontConfig.maxFontSize,
                    textHeight: fontConfig.textHeight,
                    
                    // 关闭3D效果
                    depth: 0,
                    zoom: 1.0,
                    
                    // 动画速度
                    maxSpeed: 0.01,
                    initial: [0, 0],
                    
                    // 交互
                    wheelZoom: false,
                    dragControl: true,
                    clickToFront: 600,
                    freezeActive: true,
                    frontSelect: true,
                    
                    // 权重功能
                    weight: true,
                    weightMode: 'size',
                    weightSize: 1.5,
                    weightFrom: 'data-weight',
                    
                    // 字体和布局
                    textFont: 'Arial, sans-serif',
                    padding: 12,
                    outlineMethod: 'colour',
                    activeCursor: 'pointer',
                    
                    // 平面布局（禁用球体效果）
                    shape: 'hcylinder', // 水平圆柱形，类似横屏效果
                    lock: 'xy', // 锁定在平面
                    
                    // 横屏区域参数
                    stretchX: 1.8,
                    stretchY: 0.8,
                    radiusX: 0,
                    radiusY: 0,
                    radiusZ: 0,
                    
                    // 移动版调整
                    padding: isMobileDevice() ? 10 : 12,
                    minFontSize: isMobileDevice() ? 8 : 12,
                    maxFontSize: isMobileDevice() ? 20 : 28,
                    
                    // 颜色和外观
                    minBrightness: 0.4,
                    maxBrightness: 1.0,
                    
                    // 其他参数
                    offsetX: 0,
                    offsetY: 0,
                    fadeIn: 800,
                    freezeDecel: true,
                    shadow: false,
                    shadowBlur: 0,
                    outlineThickness: 0,
                    outlineMethod: 'none',
                    
                    // 布局参数 - 平面分布
                    distributed: true,
                    centreFunc: function() { return [0, 0]; }
                });
                
                // 开始随机运动
                setTimeout(startHorizontalMovement, 1000);
                
            } catch(e) {
                console.error('初始化标签云失败:', e);
                document.getElementById('horizontal-container').style.display = 'none';
            }
        }
        
        window.onload = function() {
            // 初始化标签权重
            const maxArticles = initTagWeights();
            console.log(`标签数量: ${document.querySelectorAll('#tag-data li a').length}, 最大文章数量: ${maxArticles}`);
            
            // 初始化标签云
            initTagCanvas();
            
            // 窗口大小改变时重新初始化
            let resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    adaptSize();
                    if (isMobileDevice()) {
                        try {
                            TagCanvas.Reload('tagCanvas');
                        } catch(e) {
                            initTagCanvas();
                        }
                    }
                }, 200);
            });
            
            setTimeout(adaptSize, 100);
        };

        function filterByTag(tagName) {
            const items = document.querySelectorAll('.archive-item');
            const sections = document.querySelectorAll('.year-section');
            const display = document.getElementById('filterDisplay');
            display.innerHTML = `<span class="active-tag-hint">已選標籤：#${tagName}</span> <span class="reset-btn" onclick="resetFilter()">顯示全部</span>`;
            items.forEach(item => {
                const tags = item.getAttribute('data-tags').split(',');
                item.style.display = tags.includes(tagName) ? 'flex' : 'none';
            });
            sections.forEach(section => {
                const hasVisible = Array.from(section.querySelectorAll('.archive-item')).some(i => i.style.display === 'flex');
                section.style.display = hasVisible ? 'block' : 'none';
            });
        }

        function resetFilter() {
            document.querySelectorAll('.archive-item').forEach(i => i.style.display = 'flex');
            document.querySelectorAll('.year-section').forEach(s => s.style.display = 'block');
            document.getElementById('filterDisplay').innerHTML = '';
        }
    </script>
</body>
</html>
