<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章歸檔 - 北方的博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
    <style>
        body { background: white; }
        .markdown-body { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        /* 球體容器：保持純淨透明 */
        #sphere-container {
            width: 100%;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            overflow: hidden;
        }

        .year-section { margin-top: 40px; border-left: 4px solid #0366d6; padding-left: 15px; }
        .archive-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .archive-date { color: #888; font-family: monospace; }
        #tag-data { display: none; } 
    </style>
</head>
<body>
    <div class="markdown-body">
        <a href="index.html" style="text-decoration: none; color: #0366d6;">← 返回首頁</a>
        <h1 style="text-align: center; border-bottom: none;">文章歸檔</h1>

        <div id="sphere-container">
            <canvas width="500" height="500" id="tagCanvas">
                <p>您的瀏覽器不支持 Canvas</p>
            </canvas>
        </div>

        <ul id="tag-data">
            {% for name, items in label_dict.items() %}
            <li>
                <a href="index.html" 
                   onclick="localStorage.setItem('filter', '{{ label_info[name].safe_name }}')"
                   style="color: #{{ label_info[name].color }};">
                    {{ name }}
                </a>
            </li>
            {% endfor %}
        </ul>

        <div class="archive-list-wrapper">
            {% for year in sorted_years %}
            <div class="year-section">
                <h2>{{ year }} 年</h2>
                <ul style="list-style: none; padding: 0;">
                    {% for issue in articles_by_year[year] %}
                    <li class="archive-item">
                        <a href="articles/article-{{ issue.number }}.html">{{ issue.title }}</a>
                        <span class="archive-date">{{ issue.created_at.strftime('%m-%d') }}</span>
                    </li>
                    {% endfor %}
                </ul>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://www.goat1000.com/tagcanvas.min.js" type="text/javascript"></script>

    <script type="text/javascript">
        window.onload = function() {
            try {
                TagCanvas.Start('tagCanvas', 'tag-data', {
                    textColour: null,           
                    outlineColour: 'transparent', 
                    reverse: true,              
                    
                    // --- 解決字體大小與球形感問題 ---
                    weight: true,
                    weightMode: 'size',
                    weightSize: 0.7,            // 降低權重敏感度，讓字體更整齊
                    minFontSize: 16,            // 最小字體，不再細如螞蟻
                    maxFontSize: 24,            // 最大字體，不再撐破球體
                    
                    depth: 0.6,                 // 降低深度感，讓後排標籤變大一點，球體更充實
                    radiusX: 1.1,               // 微調比例
                    radiusY: 1.1,
                    
                    maxSpeed: 0.04,             
                    initial: [0.1, -0.1],       
                    dragControl: true,          
                    wheelZoom: false,
                    noSelect: true,
                    freezeActive: false,
                    shuffleTags: true           // 打亂分佈，讓標籤少時也像球
                });
            } catch(e) {
                document.getElementById('sphere-container').style.display = 'none';
            }
        };
    </script>
</body>
</html>
