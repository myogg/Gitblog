<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章歸檔 - 北方的博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
    <style>
        body { background: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
        .markdown-body { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        /* 椭圆形3D球体容器 */
        #sphere-container {
            width: 100%;
            height: 0;
            padding-bottom: 66.67%; /* 3:2 比例的椭圆形 */
            position: relative;
            margin: 20px 0;
            overflow: hidden;
            background: white;
        }

        /* 两个canvas绝对定位 */
        #tagCanvas, #gridCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            cursor: pointer;
        }
        
        #tagCanvas {
            z-index: 2;
        }
        
        #gridCanvas {
            z-index: 1;
            pointer-events: none;
        }

        .filter-info { 
            text-align: center; 
            margin-bottom: 20px; 
            min-height: 30px; 
        }
        .year-section { margin-top: 30px; border-left: 4px solid #0366d6; padding-left: 15px; }
        .archive-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .archive-date { color: #888; font-family: monospace; }
        #tag-data { display: none; }
        .reset-btn {
            display: inline-block;
            margin-left: 10px;
            padding: 2px 8px;
            font-size: 12px;
            background: #f6f8fa;
            border: 1px solid #d1d5da;
            border-radius: 3px;
            cursor: pointer;
            color: #24292e;
            vertical-align: middle;
        }
        .active-tag-hint { color: #0366d6; font-weight: bold; font-size: 1.1em; }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            #sphere-container {
                padding-bottom: 66.67%; /* 保持3:2比例 */
            }
            
            .archive-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            
            .archive-date {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="markdown-body">
        <a href="index.html" style="text-decoration: none; color: #0366d6;">← 返回首頁</a>
        <h1 style="text-align: center; border-bottom: none; margin-bottom: 0;">文章歸檔</h1>

        <!-- 椭圆形3D球体容器 -->
        <div id="sphere-container">
            <canvas id="gridCanvas"></canvas>
            <canvas id="tagCanvas">
                <p>您的瀏覽器不支持 Canvas</p>
            </canvas>
        </div>

        <div class="filter-info" id="filterDisplay"></div>

        <ul id="tag-data">
            {% for name, items in label_dict.items() %}
            <li>
                <a href="javascript:void(0)" onclick="filterByTag('{{ name }}')" style="color: #{{ label_info[name].color }};">
                    {{ name }}
                </a>
            </li>
            {% endfor %}
        </ul>

        <div id="archive-content">
            {% for year in sorted_years %}
            <div class="year-section" data-year="{{ year }}">
                <h2>{{ year }} 年</h2>
                <ul style="list-style: none; padding: 0;">
                    {% for issue in articles_by_year[year] %}
                    <li class="archive-item" data-tags="{{ issue.labels | map(attribute='name') | join(',') }}">
                        <a href="articles/article-{{ issue.number }}.html">{{ issue.title }}</a>
                        <span class="archive-date">{{ issue.created_at.strftime('%m-%d') }}</span>
                    </li>
                    {% endfor %}
                </ul>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://www.goat1000.com/tagcanvas.min.js" type="text/javascript"></script>

    <script type="text/javascript">
        // 绘制绿色椭圆形轮廓线
        function drawEllipseOutline() {
            const container = document.getElementById('sphere-container');
            const canvas = document.getElementById('gridCanvas');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            // 设置canvas实际尺寸
            canvas.width = width;
            canvas.height = height;
            
            const ctx = canvas.getContext('2d');
            const centerX = width / 2;
            const centerY = height / 2;
            const radiusX = width * 0.4;  // 椭圆形X轴半径
            const radiusY = height * 0.3; // 椭圆形Y轴半径
            
            ctx.clearRect(0, 0, width, height);
            
            // 设置绿色线条
            ctx.strokeStyle = '#4CAF50';
            ctx.lineWidth = 1.2;
            ctx.fillStyle = 'transparent';
            
            // 绘制椭圆形外轮廓
            ctx.beginPath();
            ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2);
            ctx.stroke();
            
            // 绘制经线（纵向）
            for (let i = 0; i < 12; i++) {
                const angle = (i * Math.PI) / 6;
                ctx.beginPath();
                for (let j = 0; j <= 100; j++) {
                    const phi = (j * Math.PI) / 100;
                    // 椭圆形坐标计算
                    const x = centerX + radiusX * Math.sin(phi) * Math.cos(angle);
                    const y = centerY + radiusY * Math.cos(phi);
                    if (j === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.stroke();
            }
            
            // 绘制纬线（横向）
            for (let i = 1; i < 5; i++) {
                const phi = (i * Math.PI) / 5;
                const currentRadiusX = radiusX * Math.sin(phi);
                const currentRadiusY = radiusY * Math.sin(phi);
                const y = centerY + radiusY * Math.cos(phi);
                
                ctx.beginPath();
                for (let j = 0; j <= 100; j++) {
                    const theta = (j * 2 * Math.PI) / 100;
                    const x = centerX + currentRadiusX * Math.cos(theta);
                    if (j === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();
                ctx.stroke();
            }
            
            // 绘制更强的外轮廓
            ctx.beginPath();
            ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2);
            ctx.strokeStyle = '#4CAF50';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 添加内部填充效果
            ctx.beginPath();
            ctx.ellipse(centerX, centerY, radiusX * 0.95, radiusY * 0.95, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(76, 175, 80, 0.02)';
            ctx.fill();
        }
        
        // 随机旋转函数
        function startEllipticalRotation() {
            const canvas = document.getElementById('tagCanvas');
            let rotationSpeedX = (Math.random() * 0.02 - 0.01) * 0.8; // X轴旋转速度
            let rotationSpeedY = (Math.random() * 0.02 - 0.01) * 0.5; // Y轴旋转速度（较慢，适应椭圆形）
            
            function rotateEllipse() {
                try {
                    TagCanvas.textId = 'tag-data';
                    TagCanvas.Reload('tagCanvas');
                    
                    const currentRot = TagCanvas.GetObject('tagCanvas');
                    if (currentRot && currentRot.rotation) {
                        // 偶尔随机改变旋转方向
                        if (Math.random() < 0.01) {
                            rotationSpeedX = (Math.random() * 0.02 - 0.01) * 0.8;
                            rotationSpeedY = (Math.random() * 0.02 - 0.01) * 0.5;
                        }
                        
                        // 应用旋转
                        currentRot.rotation[0] += rotationSpeedX;
                        currentRot.rotation[1] += rotationSpeedY;
                        
                        // 限制旋转角度，防止过快
                        rotationSpeedX = Math.max(-0.008, Math.min(0.008, rotationSpeedX));
                        rotationSpeedY = Math.max(-0.004, Math.min(0.004, rotationSpeedY));
                    }
                } catch(e) {}
                
                requestAnimationFrame(rotateEllipse);
            }
            
            rotateEllipse();
        }
        
        // 自适应调整
        function adaptEllipseSize() {
            const container = document.getElementById('sphere-container');
            const tagCanvas = document.getElementById('tagCanvas');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            // 设置canvas实际尺寸
            tagCanvas.width = width;
            tagCanvas.height = height;
            
            // 重绘轮廓线
            drawEllipseOutline();
            
            // 重新加载标签云
            try {
                TagCanvas.Reload('tagCanvas');
            } catch(e) {}
        }
        
        window.onload = function() {
            // 先绘制绿色椭圆形轮廓
            drawEllipseOutline();
            
            try {
                TagCanvas.Start('tagCanvas', 'tag-data', {
                    textColour: null,
                    outlineColour: 'transparent',
                    reverse: true,
                    
                    // 字体大小
                    minFontSize: 28,  // 增大字体
                    maxFontSize: 65,  // 增大字体
                    textHeight: 22,
                    
                    // 椭圆形3D效果 - 关键调整
                    depth: 0.35,      // 增加深度感
                    zoom: 1.15,       // 放大显示
                    
                    // 动画控制
                    maxSpeed: 0.04,   // 增加速度
                    initial: [0.1, 0.05], // 初始角度
                    
                    // 交互设置
                    wheelZoom: false,
                    dragControl: true,
                    clickToFront: 600,
                    freezeActive: true,
                    frontSelect: true,
                    
                    // 标签权重
                    weight: true,
                    weightMode: 'size',
                    weightSize: 2.0,   // 增加权重
                    
                    // 字体和布局
                    textFont: 'Impact, Arial Black, sans-serif',
                    padding: 8,        // 增加间距
                    outlineMethod: 'colour',
                    activeCursor: 'pointer',
                    
                    // 关键：调整为椭圆形参数
                    stretchX: 1.8,     // X轴拉伸（水平方向）
                    stretchY: 0.7,     // Y轴压缩（垂直方向）
                    
                    // 椭圆形球体参数
                    radiusX: 1.5,      // X轴半径（水平方向）
                    radiusY: 0.9,      // Y轴半径（垂直方向）减小以形成椭圆形
                    radiusZ: 1.2,      // Z轴半径
                    
                    // 位置调整
                    offsetX: 0,
                    offsetY: 0,
                    lock: null,
                    
                    // 阴影效果
                    shadow: false,
                    shadowBlur: 0,
                    shadowOffset: [0, 0],
                    
                    // 其他参数
                    tooltip: null,
                    tooltipDelay: 0,
                    tooltipFont: null
                });
                
                // 开始椭圆形随机旋转
                setTimeout(startEllipticalRotation, 800);
                
            } catch(e) {
                console.log(e);
                document.getElementById('sphere-container').style.display = 'none';
            }
            
            // 窗口大小改变时自适应
            let resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    adaptEllipseSize();
                }, 200);
            });
            
            // 初始自适应
            setTimeout(adaptEllipseSize, 100);
        };

        function filterByTag(tagName) {
            const items = document.querySelectorAll('.archive-item');
            const sections = document.querySelectorAll('.year-section');
            const display = document.getElementById('filterDisplay');
            display.innerHTML = `<span class="active-tag-hint">已選標籤：#${tagName}</span> <span class="reset-btn" onclick="resetFilter()">顯示全部</span>`;
            items.forEach(item => {
                const tags = item.getAttribute('data-tags').split(',');
                item.style.display = tags.includes(tagName) ? 'flex' : 'none';
            });
            sections.forEach(section => {
                const hasVisible = Array.from(section.querySelectorAll('.archive-item')).some(i => i.style.display === 'flex');
                section.style.display = hasVisible ? 'block' : 'none';
            });
        }

        function resetFilter() {
            document.querySelectorAll('.archive-item').forEach(i => i.style.display = 'flex');
            document.querySelectorAll('.year-section').forEach(s => s.style.display = 'block');
            document.getElementById('filterDisplay').innerHTML = '';
        }
    </script>
</body>
</html>
