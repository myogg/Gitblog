<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索 - 北方的博客</title>
    <meta name="description" content="搜索北方的博客文章 - 快速查找感兴趣的技术文章和分享内容。">
    <meta name="keywords" content="博客搜索,文章搜索,技术文章">
    <meta name="author" content="Jiang Sheng">
    <!-- Work Sans 字体 - 使用国内CDN加速 -->
    <link rel="preconnect" href="https://fonts.loli.net">
    <link href="https://fonts.loli.net/css2?family=Work+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- GitHub Markdown CSS - 使用jsDelivr国内加速 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.2.0/github-markdown-light.min.css">
    <link rel="stylesheet" href="static/style.css">

    <!-- Structured Data - WebSite with SearchAction -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "北方的博客",
        "url": "https://134688.xyz",
        "potentialAction": {
            "@type": "SearchAction",
            "target": {
                "@type": "EntryPoint",
                "urlTemplate": "https://134688.xyz/search.html?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
        }
    }
    </script>

    <style>
        .search-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 20px;
        }
        #searchBox {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            transition: border-color 0.3s;
        }
        #searchBox:focus {
            border-color: #0366d6;
        }
        #searchResults {
            margin-top: 2rem;
        }
        .search-result {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }
        .search-result-title {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }
        .search-result-title a {
            color: #0366d6;
            text-decoration: none;
        }
        .search-result-title a:hover {
            text-decoration: underline;
        }
        .search-result-snippet {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .search-result-meta {
            color: #888;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        .highlight {
            background-color: #fff8c5;
            padding: 0 2px;
        }
    </style>
</head>
<body>
    <div class="markdown-body">
        <h1 class="page-title">北方的博客</h1>
        
        <div class="nav-links">
            <a href="index.html">首頁</a>
            <a href="search.html">搜索</a>
            <a href="about.html">關於</a>
        </div>

        <div class="search-container">
            <input type="text" id="searchBox" placeholder="輸入關鍵詞搜索文章...">
            <div id="searchResults"></div>
        </div>

        <footer>© {{YEAR}} Designed and developed by Jiang Sheng</footer>
    </div>

    <script src="static/search-index.json"></script>
    <script>
        let searchData = [];
        
        // 加載搜索索引
        fetch('static/search-index.json')
            .then(response => response.json())
            .then(data => {
                searchData = data;
            })
            .catch(error => console.error('加載搜索索引失敗:', error));

        const searchBox = document.getElementById('searchBox');
        const searchResults = document.getElementById('searchResults');
        
        searchBox.addEventListener('input', debounce(performSearch, 300));
        
        function performSearch() {
            const query = searchBox.value.trim().toLowerCase();
            
            if (!query) {
                searchResults.innerHTML = '';
                return;
            }
            
            const results = searchData.filter(item => {
                return item.title.toLowerCase().includes(query) || 
                       item.content.toLowerCase().includes(query) ||
                       item.tags.some(tag => tag.toLowerCase().includes(query));
            });
            
            displayResults(results, query);
        }
        
        function displayResults(results, query) {
            if (results.length === 0) {
                searchResults.innerHTML = '<p style="text-align: center; color: #888;">未找到相關結果</p>';
                return;
            }
            
            let html = `<p style="color: #888; margin-bottom: 1rem;">找到 ${results.length} 個結果</p>`;
            
            results.forEach(result => {
                const snippet = getSnippet(result.content, query);
                const highlightedTitle = highlightText(result.title, query);
                const highlightedSnippet = highlightText(snippet, query);
                
                html += `
                    <div class="search-result">
                        <div class="search-result-title">
                            <a href="${result.url}">${highlightedTitle}</a>
                        </div>
                        <div class="search-result-snippet">${highlightedSnippet}</div>
                        <div class="search-result-meta">
                            ${result.date} · ${result.tags.map(tag => `<span class="tag">${tag}</span>`).join(' ')}
                        </div>
                    </div>
                `;
            });
            
            searchResults.innerHTML = html;
        }
        
        function getSnippet(content, query, length = 200) {
            const index = content.toLowerCase().indexOf(query);
            if (index === -1) {
                return content.substring(0, length) + '...';
            }
            
            const start = Math.max(0, index - 50);
            const end = Math.min(content.length, index + 150);
            const snippet = (start > 0 ? '...' : '') + 
                           content.substring(start, end) + 
                           (end < content.length ? '...' : '');
            return snippet;
        }
        
        function highlightText(text, query) {
            if (!query) return text;
            const regex = new RegExp(`(${query})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }
        
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
    </script>
</body>
  </html>
