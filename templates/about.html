<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於我 - 北方的博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
    <link rel="stylesheet" href="static/style.css">
    <style>
        /* 保留您原本關於頁特有的友情連結樣式 */
        .profile-photo { width: 200px; height: 200px; margin: 0 auto 30px; border-radius: 50%; overflow: hidden; border: 4px solid #f0f0f0; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .profile-photo img { width: 100%; height: 100%; object-fit: cover; }
        .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .link-item { display: block; padding: 15px; background: #f8f9fa; border-radius: 8px; text-decoration: none !important; color: #24292e !important; border: 1px solid #e1e4e8; transition: all 0.2s; }
        .link-item:hover { background: #f1f8ff; border-color: #0366d6; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .link-title { font-weight: bold; margin-bottom: 5px; display: block; }
        .link-url { font-size: 0.85em; color: #586069; word-break: break-all; }
    </style>
</head>
<body>
    <div class="markdown-body">
        <div class="header-line"></div>
        <h1 class="page-title">北方的博客</h1>
        <div class="nav-links">
            <a href="index.html">首頁</a>
            <a href="archives.html">歸檔</a>
            <a href="about.html">關於</a>
        </div>

        <div class="about-container">
            <div class="profile-photo">
                <img src="https://github.com/myogg.png" alt="Profile">
            </div>
            
            <section>
                <h2 style="text-align:center; border:none;">關於我</h2>
                <p>這裡是我的個人空間，記錄生活與技術。</p>
            </section>

            <section style="margin-top: 50px;">
                <h2 style="border-bottom: 1px solid #eee; padding-bottom: 10px;">友情連結</h2>
                <div class="links-grid" id="linksGrid">
                    <div style="grid-column: 1/-1; text-align: center; color: #888;">正在加載連結...</div>
                </div>
            </section>
        </div>

        <footer>© {{YEAR}} 北方的博客. All rights reserved.</footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('friendship_links.json')
                .then(response => response.json())
                .then(data => {
                    const grid = document.getElementById('linksGrid');
                    grid.innerHTML = '';
                    if (data.links && data.links.length > 0) {
                        data.links.forEach(link => {
                            const a = document.createElement('a');
                            a.className = 'link-item';
                            a.href = link.url;
                            a.target = '_blank';
                            a.innerHTML = `<span class="link-title">${link.name}</span><span class="link-url">${link.url.replace(/^https?:\/\//, '')}</span>`;
                            grid.appendChild(a);
                        });
                    }
                })
                .catch(err => {
                    document.getElementById('linksGrid').innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #d73a49;">無法加載連結</div>';
                });
        });
    </script>
</body>
</html>
