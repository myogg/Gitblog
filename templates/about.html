<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於我 - 北方的博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
    <style>
        body { 
            background: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
        }
        .markdown-body { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 40px 20px; 
        }
        
        /* 关于区域 */
        .about-container {
            margin: 40px 0 60px;
            text-align: center;
        }
        
        /* 照片区域 */
        .profile-photo {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #f0f0f0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background-color: #f9f9f9;
        }
        
        .profile-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* 自我介绍 */
        .intro {
            max-width: 700px;
            margin: 0 auto 60px;
            line-height: 1.8;
            color: #333;
            font-size: 18px;
            padding: 0 20px;
        }
        
        /* 友情链接区域 */
        .friend-links {
            margin-top: 50px;
            padding-top: 40px;
            border-top: 1px solid #eaeaea;
        }
        
        .friend-links h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 24px;
        }
        
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .link-item {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
            border: 1px solid #eaeaea;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .link-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-color: #0366d6;
            background: white;
        }
        
        .link-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #0366d6;
            font-size: 18px;
        }
        
        .link-desc {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .link-url {
            font-size: 12px;
            color: #888;
            word-break: break-all;
            font-family: monospace;
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        
        .favicon {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            vertical-align: middle;
            border-radius: 3px;
        }
        
        .link-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        
        /* 移动版调整 */
        @media (max-width: 768px) {
            .markdown-body {
                padding: 20px 15px;
            }
            
            .profile-photo {
                width: 150px;
                height: 150px;
            }
            
            .intro {
                font-size: 16px;
                padding: 0 10px;
            }
            
            .links-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="markdown-body">
        <a href="index.html" style="text-decoration: none; color: #0366d6;">← 返回首頁</a>
        
        <div class="about-container">
            <h1 style="text-align: center; border-bottom: none; margin-bottom: 20px;">關於我</h1>
            
            <!-- 照片区域 -->
            <div class="profile-photo">
                <img src="https://pic.imgdd.cc/item/68975648abb08ec37a9cd5e8.png" alt="我的照片">
            </div>
            
            <!-- 自我介绍 -->
            <div class="intro">
                <p>用文字记录我的胡思乱想与生活的瞬间，我疯狂的想法与可能为之的行动。</p>
                <p>记录在这个时代下的焦虑、迷茫、挣扎与希望。</p>
            </div>
        </div>
        
        <!-- 友情链接区域 -->
        <div class="friend-links">
            <h2>🔗 友情链接</h2>
            
            <div class="links-grid">
                <!-- 直接显示卡片形式的友情链接 -->
                <a href="https://829259.xyz" target="_blank" class="link-item">
                    <div class="link-header">
                        <img src="https://829259.xyz/favicon.ico" alt="favicon" class="favicon" onerror="this.style.display='none'">
                        <div class="link-title">829259.xyz</div>
                    </div>
                    <div class="link-desc">一个个人网站</div>
                    <div class="link-url">829259.xyz</div>
                </a>
                
                <a href="https://jianghaiyia.com" target="_blank" class="link-item">
                    <div class="link-header">
                        <img src="https://jianghaiyia.com/favicon.ico" alt="favicon" class="favicon" onerror="this.style.display='none'">
                        <div class="link-title">jianghaiyia.com</div>
                    </div>
                    <div class="link-desc">一个个人网站</div>
                    <div class="link-url">jianghaiyia.com</div>
                </a>
                
                <a href="https://jreely.dpdns.org" target="_blank" class="link-item">
                    <div class="link-header">
                        <img src="https://jreely.dpdns.org/favicon.ico" alt="favicon" class="favicon" onerror="this.style.display='none'">
                        <div class="link-title">jreely.dpdns.org</div>
                    </div>
                    <div class="link-desc">一个个人网站</div>
                    <div class="link-url">jreely.dpdns.org</div>
                </a>
                
                <a href="https://tel.qzz.io" target="_blank" class="link-item">
                    <div class="link-header">
                        <img src="https://tel.qzz.io/favicon.ico" alt="favicon" class="favicon" onerror="this.style.display='none'">
                        <div class="link-title">tel.qzz.io</div>
                    </div>
                    <div class="link-desc">一个个人网站</div>
                    <div class="link-url">tel.qzz.io</div>
                </a>
                
                <a href="https://myogg.hidns.co" target="_blank" class="link-item">
                    <div class="link-header">
                        <img src="https://myogg.hidns.co/favicon.ico" alt="favicon" class="favicon" onerror="this.style.display='none'">
                        <div class="link-title">myogg.hidns.co</div>
                    </div>
                    <div class="link-desc">一个个人网站</div>
                    <div class="link-url">myogg.hidns.co</div>
                </a>
            </div>
        </div>
    </div>

    <script>
        // 尝试自动获取网站标题（可选功能，不影响初始显示速度）
        document.addEventListener('DOMContentLoaded', function() {
            // 这个函数会在页面加载后慢慢获取网站标题
            // 不影响初始显示速度
            setTimeout(async function() {
                const linkItems = document.querySelectorAll('.link-item');
                
                for (let linkItem of linkItems) {
                    const url = linkItem.href;
                    const titleElement = linkItem.querySelector('.link-title');
                    const domain = titleElement.textContent;
                    
                    // 如果已经是自定义标题（不是域名），则跳过
                    if (!domain.includes('.') || domain === '一个个人网站') continue;
                    
                    try {
                        // 使用简单的fetch获取标题
                        const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                        const data = await response.json();
                        const html = data.contents;
                        
                        // 提取标题
                        const titleMatch = html.match(/<title>([^<]*)<\/title>/i);
                        if (titleMatch && titleMatch[1]) {
                            const title = titleMatch[1].trim();
                            if (title && title !== '' && title !== domain) {
                                titleElement.textContent = title;
                            }
                        }
                    } catch (error) {
                        // 失败也没关系，保持原样
                    }
                }
            }, 1000); // 延迟1秒执行，不影响页面初始加载
        });
    </script>
</body>
</html>
